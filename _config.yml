title: "Chips — The Complete Guide"
description: "From Sand to Supercomputers: a first-principles guide to chip design and architecture for AI/ML model-optimization practitioners. Transistors, datatypes, accelerators, and the hardware reasons behind every quantization and sparsity decision."
baseurl: "/chips"
url: "https://karam-nus.github.io"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

include:
  - README.md

